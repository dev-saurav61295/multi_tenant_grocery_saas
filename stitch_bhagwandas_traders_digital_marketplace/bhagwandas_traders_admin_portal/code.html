<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Bhagwandas Traders Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed": "#390c00",
                    "on-secondary-fixed": "#301400",
                    "on-primary-fixed-variant": "#005228",
                    "primary": "#006d37",
                    "primary-fixed-dim": "#4ae183",
                    "tertiary-container": "#ff9875",
                    "primary-container": "#2ecc71",
                    "surface-tint": "#006d37",
                    "surface-container-high": "#e2ebe0",
                    "primary-fixed": "#6bfe9c",
                    "inverse-primary": "#4ae183",
                    "tertiary": "#98472a",
                    "on-secondary-container": "#663100",
                    "surface-bright": "#f3fcf1",
                    "on-error-container": "#93000a",
                    "outline-variant": "#bbcbbb",
                    "tertiary-fixed-dim": "#ffb59d",
                    "outline": "#6c7b6d",
                    "tertiary-fixed": "#ffdbd0",
                    "surface": "#f3fcf1",
                    "on-tertiary-fixed-variant": "#793015",
                    "surface-container": "#e8f0e5",
                    "on-secondary": "#ffffff",
                    "on-surface-variant": "#3d4a3e",
                    "on-primary-container": "#005027",
                    "surface-container-low": "#eef6eb",
                    "inverse-surface": "#2b322b",
                    "on-tertiary": "#ffffff",
                    "on-surface": "#161d17",
                    "on-secondary-fixed-variant": "#713700",
                    "on-primary": "#ffffff",
                    "secondary-fixed-dim": "#ffb783",
                    "surface-container-lowest": "#ffffff",
                    "on-background": "#161d17",
                    "on-tertiary-container": "#772e14",
                    "background": "#f3fcf1",
                    "surface-variant": "#dce5da",
                    "surface-dim": "#d4dcd2",
                    "surface-container-highest": "#dce5da",
                    "secondary": "#944a00",
                    "error-container": "#ffdad6",
                    "on-primary-fixed": "#00210c",
                    "error": "#ba1a1a",
                    "inverse-on-surface": "#ebf3e8",
                    "secondary-fixed": "#ffdcc5",
                    "secondary-container": "#fc8f34",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline-lg": ["Inter", "sans-serif"],
                    "title-md": ["Inter", "sans-serif"],
                    "label-bold": ["Inter", "sans-serif"],
                    "body-sm": ["Inter", "sans-serif"],
                    "body-lg": ["Inter", "sans-serif"]
            }
          }
        }
      }
    </script>
<style>
        body {
            background-color: #f3fcf1;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .auth-card {
            box-shadow: 0px 10px 30px rgba(44, 62, 80, 0.08);
            backdrop-filter: blur(10px);
        }
        .input-focus-ring:focus {
            outline: none;
            box-shadow: 0 0 0 2px #2ecc71;
            border-color: #2ecc71;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col items-center justify-center p-md overflow-hidden">
<!-- Atmospheric Background Decoration -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary-fixed opacity-20 rounded-full blur-3xl animate-float"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[350px] h-[350px] bg-secondary-container opacity-10 rounded-full blur-3xl animate-float" style="animation-delay: -2s;"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-[420px]">
<!-- Branding Header -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-xl shadow-lg mb-md">
<span class="material-symbols-outlined text-on-primary-container text-[40px]">storefront</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight mb-xs">Bhagwandas Traders</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Admin Portal Access</p>
</div>
<!-- Authentication Card -->
<section class="auth-card bg-surface-container-lowest p-xl rounded-xl border border-outline-variant/30">
<form class="space-y-lg" id="loginForm" onsubmit="return handleLogin(event)">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant block ml-1" for="email">Email or Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
<input class="w-full bg-surface-container-low border-transparent rounded-lg py-3 pl-11 pr-4 font-body-sm text-body-sm text-on-surface input-focus-ring transition-all placeholder:text-outline/60" id="email" name="email" placeholder="admin@bhagwandas.com" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-1">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="password">Password</label>
<a class="font-label-bold text-label-bold text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-low border-transparent rounded-lg py-3 pl-11 pr-11 font-body-sm text-body-sm text-on-surface input-focus-ring transition-all placeholder:text-outline/60" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="passIcon">visibility</span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex items-center gap-2 px-1">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant select-none" for="remember">Remember this device</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary-container font-label-bold text-label-bold py-4 rounded-lg flex items-center justify-center gap-2 shadow-lg shadow-primary-container/20 hover:brightness-105 active:scale-[0.98] transition-all" id="submitBtn" type="submit">
<span id="btnText">Sign In to Dashboard</span>
<span class="material-symbols-outlined text-[18px]" id="btnIcon">arrow_forward</span>
</button>
<!-- Feedback State (Hidden) -->
<div class="hidden animate-in fade-in slide-in-from-top-2 bg-error-container text-on-error-container p-md rounded-lg flex items-start gap-3" id="errorAlert">
<span class="material-symbols-outlined">error</span>
<p class="font-body-sm text-body-sm">Invalid credentials. Please verify your access details and try again.</p>
</div>
</form>
</section>
<!-- Footer Branding -->
<footer class="mt-xl text-center space-y-md">
<p class="font-body-sm text-body-sm text-on-surface-variant/70">
                Powered by <span class="font-bold text-on-surface-variant">FreshNeighbor SaaS Platform</span>
</p>
<div class="flex justify-center gap-xl text-on-surface-variant/40">
<a class="font-label-bold text-label-bold hover:text-primary transition-colors" href="#">Help Center</a>
<a class="font-label-bold text-label-bold hover:text-primary transition-colors" href="#">Privacy</a>
<a class="font-label-bold text-label-bold hover:text-primary transition-colors" href="#">Terms</a>
</div>
</footer>
</main>
<!-- Visual Accent Element -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-secondary-container to-primary"></div>
<script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const passIcon = document.getElementById('passIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                passIcon.textContent = 'visibility_off';
            } else {
                passInput.type = 'password';
                passIcon.textContent = 'visibility';
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const errorAlert = document.getElementById('errorAlert');

            // Visual feedback
            btn.classList.add('opacity-70', 'cursor-wait');
            btnText.textContent = 'Authenticating...';
            btnIcon.textContent = 'sync';
            btnIcon.classList.add('animate-spin');
            errorAlert.classList.add('hidden');

            // Simulate API Call
            setTimeout(() => {
                const email = document.getElementById('email').value;
                if (email.includes('error')) {
                    // Fail state
                    btn.classList.remove('opacity-70', 'cursor-wait');
                    btnText.textContent = 'Sign In to Dashboard';
                    btnIcon.textContent = 'arrow_forward';
                    btnIcon.classList.remove('animate-spin');
                    errorAlert.classList.remove('hidden');
                } else {
                    // Success state - direct to dashboard logic would go here
                    btn.classList.remove('bg-primary-container');
                    btn.classList.add('bg-secondary-container');
                    btnText.textContent = 'Access Granted';
                    btnIcon.textContent = 'check_circle';
                    btnIcon.classList.remove('animate-spin');
                    
                    setTimeout(() => {
                        alert('Authentication successful! Redirecting to Inventory Management...');
                    }, 500);
                }
            }, 1500);

            return false;
        }
    </script>
</body></html>
