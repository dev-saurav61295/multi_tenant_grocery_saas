<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Bhagwandas Traders Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#ffdcc5",
                    "tertiary-fixed": "#ffdbd0",
                    "surface-container-highest": "#dce5da",
                    "on-surface": "#161d17",
                    "surface-tint": "#006d37",
                    "on-primary-fixed-variant": "#005228",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed-variant": "#793015",
                    "tertiary-fixed-dim": "#ffb59d",
                    "tertiary": "#98472a",
                    "primary-fixed-dim": "#4ae183",
                    "on-secondary": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-primary-fixed": "#00210c",
                    "on-error-container": "#93000a",
                    "on-primary-container": "#005027",
                    "surface-variant": "#dce5da",
                    "surface-container-high": "#e2ebe0",
                    "surface-container": "#e8f0e5",
                    "secondary-fixed-dim": "#ffb783",
                    "inverse-on-surface": "#ebf3e8",
                    "outline-variant": "#bbcbbb",
                    "primary-container": "#2ecc71",
                    "inverse-primary": "#4ae183",
                    "surface-dim": "#d4dcd2",
                    "surface-container-low": "#eef6eb",
                    "on-error": "#ffffff",
                    "surface": "#f3fcf1",
                    "primary-fixed": "#6bfe9c",
                    "tertiary-container": "#ff9875",
                    "on-secondary-fixed": "#301400",
                    "background": "#f3fcf1",
                    "secondary": "#944a00",
                    "error": "#ba1a1a",
                    "secondary-container": "#fc8f34",
                    "surface-bright": "#f3fcf1",
                    "on-tertiary-fixed": "#390c00",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#2b322b",
                    "on-tertiary-container": "#772e14",
                    "on-secondary-fixed-variant": "#713700",
                    "primary": "#006d37",
                    "on-surface-variant": "#3d4a3e",
                    "on-background": "#161d17",
                    "on-secondary-container": "#663100",
                    "outline": "#6c7b6d"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "24px",
                    "sm": "8px",
                    "base": "4px",
                    "container-margin-desktop": "64px",
                    "xl": "40px",
                    "md": "16px",
                    "gutter": "16px",
                    "xs": "4px",
                    "container-margin-mobile": "16px"
            },
            "fontFamily": {
                    "headline-lg": ["Inter", "sans-serif"],
                    "title-md": ["Inter", "sans-serif"],
                    "label-bold": ["Inter", "sans-serif"],
                    "body-sm": ["Inter", "sans-serif"],
                    "body-lg": ["Inter", "sans-serif"]
            }
          }
        }
      }
    </script>
<style>
        body {
            background-color: #f3fcf1;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .auth-card {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 109, 55, 0.08);
        }
        .animate-float {
            animation: float 8s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
            100% { transform: translateY(0px) scale(1); }
        }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col items-center justify-center p-md overflow-hidden antialiased">
<!-- Decorative Background -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-[-5%] right-[-2%] w-[500px] h-[500px] bg-primary-fixed opacity-15 rounded-full blur-[100px] animate-float"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[450px] h-[450px] bg-secondary-container opacity-10 rounded-full blur-[100px] animate-float" style="animation-delay: -3s;"></div>
</div>
<!-- Main Content -->
<main class="relative z-10 w-full max-w-[440px]">
<!-- Brand Section -->
<div class="flex flex-col items-center mb-xl">
<div class="flex items-center justify-center w-14 h-14 bg-primary text-white rounded-xl shadow-md mb-md">
<span class="material-symbols-outlined text-[32px]">storefront</span>
</div>
<h1 class="text-[28px] font-bold text-on-surface tracking-tight mb-xs">Bhagwandas Traders</h1>
<p class="text-body-lg text-on-surface-variant font-medium opacity-80">Inventory &amp; Order Management</p>
</div>
<!-- Login Card -->
<div class="auth-card bg-white p-xl rounded-xl">
<div class="mb-lg">
<h2 class="text-xl font-bold text-on-surface">Sign In</h2>
<p class="text-body-sm text-on-surface-variant">Enter your credentials to access the admin portal</p>
</div>
<form class="space-y-lg" id="loginForm" onsubmit="return handleLogin(event)">
<!-- Username Field -->
<div class="space-y-sm">
<label class="block text-sm font-semibold text-on-surface-variant ml-0.5" for="email">Username or Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-outline/70 text-[20px]">person</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/60 rounded-lg py-3 pl-11 pr-4 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="email" name="email" placeholder="e.g. admin_user" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-sm">
<div class="flex justify-between items-center px-0.5">
<label class="block text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-sm font-semibold text-primary hover:text-primary/80 transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-outline/70 text-[20px]">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/60 rounded-lg py-3 pl-11 pr-11 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline/60 hover:text-on-surface transition-colors p-1" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="passIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Device -->
<div class="flex items-center gap-3 px-0.5">
<input class="w-4 h-4 rounded border-outline-variant/60 text-primary focus:ring-primary cursor-pointer" id="remember" type="checkbox"/>
<label class="text-sm font-medium text-on-surface-variant select-none cursor-pointer" for="remember">Keep me signed in</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-white font-bold py-3.5 rounded-lg flex items-center justify-center gap-2 shadow-sm hover:bg-primary/95 active:scale-[0.98] transition-all" id="submitBtn" type="submit">
<span id="btnText">Sign In to Dashboard</span>
<span class="material-symbols-outlined text-[20px]" id="btnIcon">arrow_forward</span>
</button>
<!-- Feedback States -->
<div class="hidden animate-in fade-in slide-in-from-top-2 bg-error-container/50 border border-error/20 text-on-error-container p-md rounded-lg flex items-start gap-3" id="errorAlert">
<span class="material-symbols-outlined text-[20px] text-error">error</span>
<p class="text-sm font-medium leading-tight">Access denied. Please check your credentials and try again.</p>
</div>
</form>
</div>
<!-- Footer -->
<footer class="mt-xl text-center space-y-md">
<p class="text-xs font-medium text-on-surface-variant/60 uppercase tracking-widest">
                Powered by <span class="text-on-surface-variant font-bold">FreshNeighbor SaaS</span>
</p>
<div class="flex justify-center gap-lg">
<a class="text-sm font-medium text-on-surface-variant/50 hover:text-primary transition-colors" href="#">Support</a>
<span class="text-outline-variant/30">•</span>
<a class="text-sm font-medium text-on-surface-variant/50 hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="text-outline-variant/30">•</span>
<a class="text-sm font-medium text-on-surface-variant/50 hover:text-primary transition-colors" href="#">Terms</a>
</div>
</footer>
</main>
<!-- Bottom Accent Line -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-primary-container to-secondary-container opacity-50"></div>
<script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const passIcon = document.getElementById('passIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                passIcon.textContent = 'visibility_off';
            } else {
                passInput.type = 'password';
                passIcon.textContent = 'visibility';
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const errorAlert = document.getElementById('errorAlert');

            // Reset UI
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btnText.textContent = 'Authenticating...';
            btnIcon.textContent = 'progress_activity';
            btnIcon.classList.add('animate-spin');
            errorAlert.classList.add('hidden');

            // Simulate Network delay
            setTimeout(() => {
                const email = document.getElementById('email').value;
                if (email.toLowerCase().includes('error')) {
                    // Fail state
                    btn.disabled = false;
                    btn.classList.remove('opacity-80', 'cursor-not-allowed');
                    btnText.textContent = 'Sign In to Dashboard';
                    btnIcon.textContent = 'arrow_forward';
                    btnIcon.classList.remove('animate-spin');
                    errorAlert.classList.remove('hidden');
                } else {
                    // Success state
                    btn.classList.remove('bg-primary');
                    btn.classList.add('bg-primary-container', 'text-on-primary-container');
                    btnText.textContent = 'Welcome Back';
                    btnIcon.textContent = 'check_circle';
                    btnIcon.classList.remove('animate-spin');
                    
                    setTimeout(() => {
                        window.location.href = '#'; // Destination URL
                        alert('Login Successful! Redirecting...');
                    }, 800);
                }
            }, 1800);

            return false;
        }
    </script>
</body></html>
