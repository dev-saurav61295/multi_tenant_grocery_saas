<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Close modal interaction (simulated)
            const closeBtn = document.querySelector('button .material-symbols-outlined[content="close"]')?.parentElement;
            if (closeBtn) {
                closeBtn.onclick = () => {
                    document.querySelector('.fixed.inset-0.z-\\[100\\]').style.display = 'none';
                };
            }

            // Confirm button interaction (simulated)
            const confirmBtn = document.querySelector('button:contains("Confirm")');
            // Using a more robust selector since contains isn't native
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => {
                if (btn.innerText.includes('Confirm Assignment')) {
                    btn.addEventListener('click', function() {
                        this.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> Processing...`;
                        this.classList.add('pointer-events-none', 'opacity-80');
                        
                        setTimeout(() => {
                            this.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Order Assigned!`;
                            this.style.backgroundColor = '#006d37';
                            setTimeout(() => {
                                document.querySelector('.fixed.inset-0.z-\\[100\\]').style.display = 'none';
                            }, 1000);
                        }, 1500);
                    });
                }
                
                if (btn.innerText.includes('Cancel')) {
                    btn.addEventListener('click', () => {
                        document.querySelector('.fixed.inset-0.z-\\[100\\]').style.display = 'none';
                    });
                }
            });
        });
    </script>
