<style>
        @keyframes soft-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.85; }
        }
        .animate-soft-pulse {
            animation: soft-pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes indeterminate-progress {
            0% { left: -35%; right: 100%; }
            60% { left: 100%; right: -90%; }
            100% { left: 100%; right: -90%; }
        }
        .progress-bar-moving {
            animation: indeterminate-progress 1.8s cubic-bezier(0.65, 0.815, 0.735, 0.395) infinite;

                    Verifying secure connection to Bhagwandas Traders...
                </p>
</div>
<!-- Connection Pulse Dots -->
<div class="flex justify-center gap-xs mt-sm">
<div class="w-1.5 h-1.5 rounded-full bg-primary-container opacity-40"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary-container opacity-70"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary-container"></div>
</div>
</footer>
<!-- Interactive Background Element (Atmospheric) -->
<div class="hidden md:block pointer-events-none fixed top-0 left-0 w-[500px] h-[500px] rounded-full blur-[100px] bg-primary/5 transition-opacity duration-500 opacity-0" id="cursor-glow"></div>
</main>
<script>
        // Micro-interaction for atmospheric mouse glow
        const glow = document.getElementById('cursor-glow');
        window.addEventListener('mousemove', (e) => {
            glow.style.opacity = '1';
            const x = e.clientX - 250;
            const y = e.clientY - 250;
            glow.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Simulate random status updates (high-fidelity feel)
        const statusText = document.querySelector('footer p');
        const statuses = [
            "Verifying secure connection to Bhagwandas Traders...",
            "Encrypting administrative session data...",
            "Synchronizing inventory global states...",
            "Fetching latest merchant analytics...",
            "Finalizing dashboard components..."
        ];
        
        let statusIndex = 0;
        setInterval(() => {
            statusIndex = (statusIndex + 1) % statuses.length;
            statusText.classList.add('opacity-0');
            setTimeout(() => {
                statusText.innerText = statuses[statusIndex];
                statusText.classList.remove('opacity-0');
            }, 300);
        }, 3500);

        // Transition simulation
        // In a real app, this would be triggered by window.onload or specific async actions

        */
    </script>
